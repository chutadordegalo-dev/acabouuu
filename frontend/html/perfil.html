<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoByte - Perfil do Usuário</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../ico/ico.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'eco-dark': '#314E3F',
                        'eco-light': '#A1B59C',
                        'eco-blue': '#4B6A7F',
                        'eco-bg': '#F9FAFB',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-eco-bg text-gray-800 flex flex-col min-h-screen">

    <header class="fixed w-full top-0 z-50 bg-white shadow-sm transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="../html/loja.html" class="flex items-center gap-3 group">
                <img src="../img/logoo.png" alt="Logo EcoByte" class="h-14 w-auto">
                <span class="text-2xl font-bold text-eco-dark tracking-tight">EcoByte</span>
            </a>
            
            <button id="btn-mobile-menu" class="md:hidden text-eco-dark p-2 text-2xl focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
            
            <nav class="hidden md:flex items-center gap-6 font-medium text-gray-600">
                <a href="../html/inicio.html" class="hover:text-eco-dark transition-colors text-sm font-bold">Home</a>
                <a href="../html/portfolio.html" class="hover:text-eco-dark transition-colors text-sm font-bold">Portfólio</a>
                <a href="../html/loja.html" class="hover:text-eco-dark transition-colors text-sm font-bold">Loja</a>
                
                <button id="btn-logout" class="text-red-600 hover:text-red-800 font-semibold transition-colors flex items-center gap-2 focus:outline-none text-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>Sair</span>
                </button>
            </nav>
        </div>

        <nav id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 px-4 py-6 space-y-5 shadow-lg flex flex-col font-medium text-gray-600">
            <a href="../html/inicio.html" class="hover:text-eco-dark transition-colors flex items-center gap-3 text-base">
                <i class="fa-solid fa-house text-eco-blue"></i> Home
            </a>
            <a href="../html/portfolio.html" class="hover:text-eco-dark transition-colors flex items-center gap-3 text-base">
                <i class="fa-solid fa-briefcase text-eco-blue"></i> Portfólio
            </a>
            <a href="../html/loja.html" class="hover:text-eco-dark transition-colors flex items-center gap-3 text-base">
                <i class="fa-solid fa-shop text-eco-blue"></i> Loja
            </a>
            <hr class="border-gray-100">
            <button id="btn-logout-mobile" class="text-red-600 hover:text-red-800 font-bold flex items-center gap-3 text-base w-full text-left">
                <i class="fa-solid fa-right-from-bracket"></i> Sair da Conta
            </button>
        </nav>
    </header>

    <main class="flex-grow   container mx-auto px-4 pt-32 pb-16 max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <aside class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center h-fit">
                <div class="relative group">
                    <img id="avatar-preview" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3" class="w-32 h-32 rounded-full object-cover border-4 border-eco-light/40 shadow-md" alt="Foto de Perfil">
                    <label for="upload-foto" class="absolute bottom-0 right-0 bg-eco-dark text-white p-2.5 rounded-full shadow-lg cursor-pointer hover:bg-eco-blue transition">
                        <i class="fa-solid fa-camera text-sm"></i>
                        <input type="file" id="upload-foto" accept="image/*" class="hidden">
                    </label>
                </div>
                <h2 id="user-display-name" class="text-xl font-bold text-eco-dark mt-4">Carregando...</h2>
                <p id="user-display-email" class="text-sm text-gray-500 mb-6">email@provedor.com</p>
                <button id="btn-trocar-conta" class="w-full text-xs font-semibold py-2 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition">Alternar de Conta</button>
            </aside>

            <section class="md:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-8">
                <article>
                    <div class="border-b border-gray-100 pb-4 mb-6">
                        <h3 class="text-lg font-bold text-eco-dark flex items-center gap-2">
                            <i class="fa-solid fa-user-gear text-eco-blue"></i> Configurações do Perfil
                        </h3>
                        <p class="text-xs text-gray-500">Mantenha seu perfil unificado com a EcoByte.</p>
                    </div>

                    <form id="form-perfil" class="space-y-4">
                        <div>
                            <label for="input-username" class="block text-xs font-semibold text-gray-700 mb-1">Nome Completo</label>
                            <input type="text" id="input-username" required class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-eco-dark bg-gray-50 text-sm">
                        </div>
                        <div>
                            <label for="input-email" class="block text-xs font-semibold text-gray-700 mb-1">E-mail Cadastrado</label>
                            <input type="email" id="input-email" disabled class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-100 text-gray-400 text-sm cursor-not-allowed">
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" class="bg-eco-dark text-white px-6 py-2.5 rounded-xl font-bold hover:bg-eco-blue transition shadow-sm text-sm">Salvar Alterações</button>
                        </div>
                    </form>
                </article>
            </section>
        </div>
    </main>

    <footer class="bg-eco-dark text-white/80 py-8 text-center mt-auto">
        <p class="text-sm font-semibold text-white mb-1">EcoByte © 2026</p>
    </footer>

    <script src="../js/perfil.js"></script>
</body>
</html>
